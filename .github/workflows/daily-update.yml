name: Daily Content Update ─ GovDX Today

on:
  schedule:
    # UTC 14:00 にキュー投入 → GitHub Actions の遅延（約7時間）により実際は JST 翌朝 6:00 頃に実行される
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 (YYYY-MM-DD)。省略時は今日 JST'
        required: false

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  update:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Node.js 20 セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 依存パッケージをインストール
        run: npm ci

      - name: コンテンツ生成
        run: node scripts/generate-content.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TARGET_DATE: ${{ inputs.target_date }}

      - name: AI要約・ブリーフ補完（未生成分のみ）
        run: |
          # generate-content.js の Gemini API 呼び出し後にレート制限が完全回復するまで待機
          # 429 リトライの最大待機（3回×65秒=195秒）を十分に上回る 300 秒とする
          echo "[INFO] Gemini APIレート制限回復のため5分待機..."
          sleep 300
          # 日付引数なし = 直近7日分を処理。前日分の取りこぼしも自動補完される
          node scripts/regenerate-brief.js
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        continue-on-error: true

      - name: Vite ビルド
        run: npm run build

      - name: データをコミット・プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git diff --staged --quiet && echo "変更なし" && exit 0
          git commit -m "chore: 日次更新 $(date -u +'%Y-%m-%d')"
          git push

      - name: GitHub Pages 設定
        uses: actions/configure-pages@v5

      - name: Pages アーティファクトをアップロード
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: GitHub Pages にデプロイ
        id: deployment
        uses: actions/deploy-pages@v4
